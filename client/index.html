<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"
    />
    <title>السريع ون - توصيل سريع للخضار والفواكه</title>
    <meta name="description" content="أفضل الخضار والفواكه الطازجة توصل لبابك - السريع ون" />
    <!-- ✅ توحيد لون الثيم مع لون الشريط العلوي للتطبيق -->
    <meta name="theme-color" content="#F97316" />
    <meta name="msapplication-navbutton-color" content="#F97316" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- ✅ تشغيل وضع التطبيق المستقل وإخفاء شريط العنوان في المتصفحات/التطبيقات -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="السريع ون" />
    <!-- ✅ اختيار ملف PWA المناسب ديناميكياً حسب نوع التطبيق (عميل/سائق/إدارة) -->
    <script>
      (function () {
        var path = window.location.pathname || '/';
        var manifestUrl = '/manifest.json';
        var titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (path.indexOf('/admin') === 0) {
          manifestUrl = '/manifest-admin.json';
          if (titleMeta) titleMeta.setAttribute('content', 'لوحة التحكم - السريع ون');
          document.title = 'لوحة التحكم - السريع ون';
        } else if (path.indexOf('/driver') === 0) {
          manifestUrl = '/manifest-driver.json';
          if (titleMeta) titleMeta.setAttribute('content', 'السائق - السريع ون');
          document.title = 'السائق - السريع ون';
        }
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestUrl;
        document.head.appendChild(link);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
